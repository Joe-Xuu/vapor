<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vapor Chat - 赛博通讯</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        h3 { margin: 0; color: #00ff88; text-shadow: 0 0 5px rgba(0,255,136,0.3); }
        #my-id { color: #888; font-size: 0.9em; user-select: all; cursor: pointer; }
        
        #chat-window { height: 400px; background: #1a1a1a; border: 1px solid #333; border-radius: 5px; overflow-y: auto; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg-box { padding: 8px 12px; border-radius: 4px; max-width: 80%; word-break: break-all; font-size: 0.95em; }
        .msg-other { background: #2a3d32; border-left: 3px solid #00ff88; align-self: flex-start; }
        .msg-self { background: #333; border-right: 3px solid #888; align-self: flex-end; color: #ccc; }
        .msg-system { background: transparent; color: #aaa; font-size: 0.85em; text-align: center; align-self: center; font-style: italic; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; outline: none; font-family: monospace; }
        input:focus { border-color: #00ff88; }
        
        button { padding: 10px 20px; background: #00ff88; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        button:hover { background: #00cc6a; box-shadow: 0 0 10px rgba(0,255,136,0.5); }
        button:active { transform: scale(0.98); }
        
        .btn-blue { background: #007acc; color: white; }
        .btn-blue:hover { background: #0099ff; box-shadow: 0 0 10px rgba(0,153,255,0.5); }
        #handshake-btn { background: #444; color: #fff; }
        #handshake-btn:hover { background: #555; box-shadow: none; }
    </style>
</head>
<body>
    <div class="header">
        <h3>Vapor Chat</h3>
        <div id="my-id">等待节点启动...</div>
    </div>

    <div id="chat-window">
        <div class="msg-box msg-system">欢迎来到 Vapor 去中心化网络。请先通过 IP 连接节点。</div>
    </div>
    
    <div class="controls">
        <input type="text" id="dial-addr" placeholder="拨号格式: /ip4/对方IP/tcp/11223" autocomplete="off">
        <button id="dial-btn" class="btn-blue">物理连接 🔗</button>
    </div>

    <div class="controls">
        <button id="handshake-btn" style="flex:1;">在已连接的物理网络中广播公钥进行握手 👋</button>
    </div>

    <div class="controls">
        <input type="text" id="msg-input" placeholder="输入要加密发送的消息..." autocomplete="off">
        <button id="send-btn">发送加密消息</button>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const { invoke } = window.__TAURI__.core;
            const { listen } = window.__TAURI__.event;

            const chatWindow = document.getElementById('chat-window');
            const myIdDiv = document.getElementById('my-id');
            const msgInput = document.getElementById('msg-input');

            function appendMsg(text, type = 'system') {
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-box msg-${type}`;
                msgDiv.textContent = text;
                chatWindow.appendChild(msgDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }

            listen('my-peer-id', (e) => { myIdDiv.textContent = `ID: ${e.payload}`; });
            
            // 🎧 监听后台发来的任何系统通知 (连接成功、拨号失败等)
            listen('system-msg', (e) => { appendMsg(e.payload, 'system'); });

            listen('p2p-message', (e) => {
                const shortId = e.payload.peer_id.substring(0, 6) + '...';
                appendMsg(`[${shortId}]: ${e.payload.msg}`, 'other');
            });

            // 📤 按钮：物理拨号连接
            document.getElementById('dial-btn').onclick = async () => {
                const addr = document.getElementById('dial-addr').value.trim();
                if (!addr) return appendMsg('❌ 请先填写地址', 'system');
                appendMsg(`⏳ 正在呼叫 ${addr}...`, 'system');
                try { await invoke('connect_to_node', { addr }); } 
                catch (e) { appendMsg(`❌ 报错: ${e}`, 'system'); }
            };

            document.getElementById('handshake-btn').onclick = async () => {
                try { await invoke('do_handshake'); } 
                catch (e) { appendMsg(`❌ 握手失败: ${e}`, 'system'); }
            };

            document.getElementById('send-btn').onclick = async () => {
                const msg = msgInput.value.trim();
                if (!msg) return;
                try {
                    await invoke('send_p2p_message', { targetId: "ALL", msg });
                    appendMsg(`我: ${msg}`, 'self');
                    msgInput.value = ''; 
                } catch (e) { appendMsg(`❌ 发送失败: ${e}`, 'system'); }
            };

            msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('send-btn').click(); });
        });
    </script>
</body>
</html>
